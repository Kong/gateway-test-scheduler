name: Integration
run-name: ${{ inputs.UUID }}

on:
  push:
    branches:
      - tests/integration-tests
  workflow_dispatch:
    inputs:
      scheduler_res_path:
        type: string
        description: path to test resources to use for this run
        required: true
        default: tests/fixtures/01
      UUID:
        type: string
        description: UUID to use for this run
        required: false

env:
  RUNNER_COUNT: 3

permissions:
  contents: read

jobs:
  schedule:
    name: Schedule tests and generate runner array
    runs-on: ubuntu-latest

    outputs:
      runners: ${{ steps.generate-runner-array.outputs.RUNNERS }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      
      - name: Schedule tests
        id: schedule
        uses: ./schedule
        with:
          test-suites-file: ${{ github.event.inputs.scheduler_res_path }}/test_suites.json # TODO: make the path parametric (inputs)
          test-file-runtime-file: ${{ github.event.inputs.scheduler_res_path }}/runtimes.json # TODO: make the path parametric (inputs)
          output-prefix: test-chunk.
          runner-count: ${{ env.RUNNER_COUNT }}

      - name: Upload schedule files
        uses: actions/upload-artifact@v3 #v4 doesn't work w/ act (can be switched back to v4 when done with local dev)
        continue-on-error: true
        with:
          name: schedule-test-files
          path: test-chunk.*
          retention-days: 1

      - name: Generate runner array
        id: generate-runner-array
        run: |
          echo "RUNNERS=[$(echo $(seq 1 $(( $RUNNER_COUNT ))))]" | sed -e 's/ /, /g' >> $GITHUB_OUTPUT

  # debugging
  # print-schedule:
  #   name: Print test-chunks
  #   runs-on: ubuntu-latest
  #   needs: schedule
  #   steps:
  #     - name: Print test chunk file names
  #       run: |
  #         echo "Test chunk files:"
  #         ls -1 test-chunk.*

  run:
    name: Run tests
    runs-on: ubuntu-latest
    needs: schedule
    
    strategy:
      matrix:
        runner: ${{ fromJSON(needs.schedule.outputs.runners) }}

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Download test schedule file
      uses: actions/download-artifact@v3
      with:
        name: schedule-test-files

    # debugging
    - name: Print test chunk file names
      run: |
        echo "Test chunk files:"
        ls -1 test-chunk.*
        echo "expecting to find test-chunk.${{ matrix.runner }}.json"

    - name: Prepare environment
      run: |
        sudo apt-get update
        sudo apt-get install -y luarocks
        mkdir bin spec
        luarocks install busted --tree=.
        luarocks install lua-cjson
        cp tests/fixtures/busted-ci-helper.lua spec/

    # debugging - print bin folder content
    - name: Print bin folder content
      run: |
        ls -1 bin

    # TODO: Rerun things here
    # ...

    - name: Run Tests
      uses: ./runner
      env:
        BUSTED_EVENT_FILE_PATH: busted-events.json
      with:
        tests-to-run-file: test-chunk.${{ matrix.runner }}.json
        failed-test-files-file: ${{ github.event.inputs.scheduler_res_path }}/failed.json # TODO: make the path parametric (inputs)
        test-file-runtime-file: ${{ github.event.inputs.scheduler_res_path }}/runtimes.json # TODO: make the path parametric (inputs)
        setup-venv: ':'

    # TODO: Upload rerun info here

    # debugging - print busted events file content
    - name: Print busted events file content
      run: |
        cat busted-events.json

    - name: Upload busted events file
      uses: actions/upload-artifact@v3
      continue-on-error: true
      with:
        name: busted-events
        path: busted-events.json
        retention-days: 1
